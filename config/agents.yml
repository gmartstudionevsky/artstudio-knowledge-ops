version: 1
project: ARTSTUDIO Knowledge Ops
principle: machine proposes, human approves, automation executes safe actions
agents:
  - id: intake-agent
    name: Intake Agent
    purpose: Accept new materials from 01_INBOX and create initial records in Source Map and Master Index.
    inputs:
      - 01_INBOX
      - ARTSTUDIO_Source_Map
      - ARTSTUDIO_Master_Index
    outputs:
      - source_map_rows
      - master_index_rows
      - context_requests
    allowed_actions:
      - classify material
      - propose target folder
      - add draft registry rows
      - request missing context
    requires_human_approval:
      - approved source status
      - external publication
      - owner assignment

  - id: catalog-agent
    name: Catalog Agent
    purpose: Classify materials into the canonical Drive structure and propose moves or renames.
    inputs:
      - ARTSTUDIO folder tree
      - Source Map
      - Master Index
    outputs:
      - reorganization_plan_rows
      - naming_issues
    allowed_actions:
      - detect misplaced files
      - detect naming issues
      - propose move or rename
      - execute low-risk accepted move or rename
    requires_human_approval:
      - high-risk moves
      - structure changes
      - ambiguous object placement

  - id: governance-agent
    name: Governance Agent
    purpose: Check decisions, statuses, owners, open questions and acceptance criteria.
    inputs:
      - Decision Log
      - Project Roadmap
      - Open Questions
      - Context Request Log
    outputs:
      - decision_log_recommendations
      - roadmap_status_recommendations
      - governance_warnings
    allowed_actions:
      - add draft decision recommendations
      - flag missing owners
      - flag stale questions
    requires_human_approval:
      - final decision
      - status approved
      - owner changes

  - id: docs-agent
    name: Docs Agent
    purpose: Prepare and update knowledge documents from approved sources.
    inputs:
      - approved source materials
      - Drive Rules
      - Glossary
    outputs:
      - draft docs
      - updated docs sections
      - glossary suggestions
    allowed_actions:
      - draft internal documents
      - update non-final sections
      - propose glossary terms
    requires_human_approval:
      - final standards
      - public text
      - legal or financial wording

  - id: qa-agent
    name: QA Agent
    purpose: Detect duplicates, contradictions, obsolete materials and unsafe automation candidates.
    inputs:
      - Drive Audit Snapshot
      - Duplicate Report
      - Naming Issues
      - Source Map
    outputs:
      - qa_findings
      - duplicate_recommendations
      - human_review_required_rows
    allowed_actions:
      - compare duplicates
      - mark obvious duplicates
      - propose trash duplicate
      - block unsafe actions
    requires_human_approval:
      - unique content possible
      - folder with children
      - conflicting authoritative sources

  - id: github-ops-agent
    name: GitHub Ops Agent
    purpose: Maintain automation code, configs, workflows, tests and handoff tasks.
    inputs:
      - GitHub repository
      - Codex Handoff Log
      - Tool Run Log
    outputs:
      - pull_request_or_commit
      - workflow_status
      - handoff_updates
    allowed_actions:
      - update code and config
      - validate workflows
      - prepare Apps Script deployment
    requires_human_approval:
      - secrets changes
      - production deployment
      - destructive automation policy changes
