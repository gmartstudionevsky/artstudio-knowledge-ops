name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m unittest discover tests
      - run: python -m compileall knowledge_ops tests
      - run: python -m knowledge_ops.drive_inventory --help
      - run: python -m knowledge_ops.ai_analysis --mode validate-config --pricing-config configs/ai_analysis_pricing.yml --routing-config configs/ai_analysis_routing.yml --dry-run true
