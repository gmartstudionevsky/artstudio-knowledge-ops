name: Validate knowledge ops

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check required files
        run: |
          set -euo pipefail
          test -f README.md
          test -f requirements.txt
          test -f config/control-center.json
          test -f config/agents.yml
          test -f docs/architecture.md
          test -f docs/runbook.md
          test -f docs/secrets.md
          test -f knowledge_ops/__init__.py
          test -f knowledge_ops/native_drive_ops.py
          test -f knowledge_ops/preparation_ops.py
          test -f knowledge_ops/strict_drive_ops.py
          test -f .github/workflows/drive-ops.yml

      - name: Validate JSON
        run: python -m json.tool config/control-center.json >/tmp/control-center.json

      - name: Validate Python syntax
        run: |
          python -m py_compile knowledge_ops/native_drive_ops.py
          python -m py_compile knowledge_ops/preparation_ops.py
          python -m py_compile knowledge_ops/strict_drive_ops.py

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check native runtime config
        run: |
          python - <<'PY'
          import json
          cfg = json.load(open('config/control-center.json', encoding='utf-8'))
          policy = cfg['automationPolicy']
          assert cfg['runtime']['primary'] == 'github_actions_service_account'
          assert cfg['runtime']['pythonEntrypoint'] == 'knowledge_ops.strict_drive_ops'
          assert cfg['runtime']['appsScriptAllowed'] is False
          assert 'GOOGLE_SERVICE_ACCOUNT_JSON' in cfg['requiredSecrets']
          assert policy['permanentDeleteAllowed'] is False
          assert policy['trashObviousDuplicatesAllowed'] is True
          assert policy['pendingTrashFallbackAllowed'] is True
          assert policy['quarantinePendingTrashPrimary'] is True
          assert policy['pendingTrashQueueSheet'] == 'Pending Trash Queue'
          assert 'quarantine pending trash' in policy['allowedAutoSafeActions']
          PY

      - name: Check empty optional secret fallbacks
        env:
          ARTSTUDIO_FOLDER_ID: ""
          CONTROL_CENTER_FOLDER_ID: ""
        run: |
          python - <<'PY'
          import json
          from knowledge_ops.native_drive_ops import KnowledgeOps, Services

          class DummyService:
              pass

          cfg = json.load(open('config/control-center.json', encoding='utf-8'))
          ops = KnowledgeOps(cfg, Services(drive=DummyService(), sheets=DummyService()), dry_run=True)
          assert ops.artstudio_folder_id == cfg['drive']['artstudioFolderId']
          assert ops.control_center_folder_id == cfg['drive']['controlCenterFolderId']
          PY

      - name: Check preparation command surface
        run: |
          set -euo pipefail
          grep -q 'plan-reorganization' knowledge_ops/strict_drive_ops.py
          grep -q 'prepare-and-plan' knowledge_ops/strict_drive_ops.py
          grep -q 'complete-prep' knowledge_ops/strict_drive_ops.py
          grep -q 'complete-prep' .github/workflows/drive-ops.yml
          grep -q 'knowledge_ops.strict_drive_ops' .github/workflows/drive-ops.yml
          grep -q 'Pending Trash Queue' knowledge_ops/strict_drive_ops.py

      - name: Check agent spec
        run: |
          set -euo pipefail
          grep -q 'intake-agent' config/agents.yml
          grep -q 'catalog-agent' config/agents.yml
          grep -q 'governance-agent' config/agents.yml
          grep -q 'docs-agent' config/agents.yml
          grep -q 'qa-agent' config/agents.yml
          grep -q 'github-ops-agent' config/agents.yml
