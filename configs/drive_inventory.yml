drive_inventory:
  scope: all-accessible-drive
  root_folder_id:
  page_size: 1000
  max_download_bytes: 10485760
  skip_google_sheets: true
  include_content_hash: false
  include_google_export_hash: false
  include_media_hash: false
  include_perceptual_image_hash: false
  enable_content_inspection: true
  content_inspection_max_files: 0
  content_char_limit: 20000
  content_page_limit: 20
  max_download_size_mb: 25
  enable_ocr: false
  enable_image_ocr: false
  enable_pdf_ocr: false
  enable_presentation_ocr: false
  enable_google_cloud_vision: false
  enable_document_ai: false
  ocr_max_files: 0
  ocr_max_pages_per_file: 10
  ocr_max_file_size_mb: 25
  ocr_only_for_review_queue: true
  ocr_only_for_document_scan_candidates: true
  ocr_allow_sensitive: false
  ocr_store_text: false
  ocr_store_sensitive_snippets: false
  allow_sensitive_cloud_ai: false
  allow_cloud_ai_calls: false
  enable_excel_content_inspection: true
  store_content_preview: false
  store_sensitive_snippets: false
  content_rules_config: configs/drive_content_rules.yml
  classification_taxonomy_config: configs/drive_classification_taxonomy.yml
  path_rules_config: configs/drive_path_rules.yml
  filename_rules_config: configs/drive_filename_rules.yml
  extension_rules_config: configs/drive_extension_rules.yml
  sensitivity_rules_config: configs/drive_sensitivity_rules.yml
  media_rules_config: configs/drive_media_rules.yml
  cleanup_rules_config: configs/drive_cleanup_rules.yml
  classification_engine:
    use_rule_index: true
    strict_full_scan: false
    normalization_cache_size: 50000
    slow_rule_ms: 2.0
  quality_gates:
    unknown_object_rate_max: 0.50
    unknown_department_rate_max: 0.50
    unknown_document_type_rate_max: 0.50
    conflict_rate_max: 0.10
    sensitive_unknown_rate_max: 0.30
  safe_mode: true
  cache_dir: .cache/drive_inventory
